# ============================================================
# HanVerse Redis Configuration
# ============================================================
# DB0: BullMQ Queue (assessment + practice jobs)
# DB1: Session cache + API response cache
# DB2: Rate limiter counters
# ============================================================

# Limit to exactly 3 databases
databases 3

# ---- Persistence ----
# RDB: snapshot every 60s if >=1 key changed (lightweight for dev)
save 60 1
# AOF: disabled (cache-first workload; re-enable in prod if needed)
appendonly no

# ---- Memory Management ----
maxmemory 256mb
# Evict least-recently-used keys when maxmemory hit (protects cache DBs)
maxmemory-policy allkeys-lru

# ---- Network ----
bind 0.0.0.0
port 6379
protected-mode no

# ---- Logging ----
loglevel notice
logfile ""

# ---- Slow Log ----
slowlog-log-slower-than 10000
slowlog-max-len 128
