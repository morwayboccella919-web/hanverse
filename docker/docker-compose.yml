version: "3.9"

services:
  # ============================================================
  # PostgreSQL (dev - prod uses Supabase)
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: hanverse-postgres
    environment:
      POSTGRES_USER: hanverse
      POSTGRES_PASSWORD: hanverse_dev
      POSTGRES_DB: hanverse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../contracts/db-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hanverse"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================================
  # Redis (Queue + Cache + Rate Limiter)
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: hanverse-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============================================================
  # NestJS Backend API
  # ============================================================
  backend:
    build:
      context: ../hanverse-worktrees/backend
      dockerfile: Dockerfile
    container_name: hanverse-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://hanverse:hanverse_dev@postgres:5432/hanverse
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_secret_change_in_production
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY}
      R2_SECRET_KEY: ${R2_SECRET_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../hanverse-worktrees/backend/src:/app/src
    command: npm run start:dev

  # ============================================================
  # Python AI Worker
  # ============================================================
  ai-worker:
    build:
      context: ../hanverse-worktrees/ai-worker
      dockerfile: Dockerfile
    container_name: hanverse-ai-worker
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://hanverse:hanverse_dev@postgres:5432/hanverse
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY}
      R2_SECRET_KEY: ${R2_SECRET_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../hanverse-worktrees/ai-worker/src:/app/src

volumes:
  postgres_data:
  redis_data:
